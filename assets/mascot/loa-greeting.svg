<?xml version="1.0" encoding="UTF-8"?>
<!--
  Loa, greeting pose. Wing raised in a small wave.
  Used at the closing CTA so she appears to greet the visitor
  who's reached the end of the page.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220" role="img" aria-labelledby="loa-greet-title">
    <title id="loa-greet-title">Loa waving hello.</title>

    <style>
        .loa-figure { transform-origin: 120px 200px; animation: loa-breathe 4.8s ease-in-out infinite; }
        .loa-wing   { transform-origin: 138px 110px; animation: loa-wave 1.8s ease-in-out infinite; }
        .loa-lid    { opacity: 0; animation: loa-blink 5.6s ease-in-out infinite; }
        @keyframes loa-breathe {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-2px); }
        }
        @keyframes loa-wave {
            0%, 100% { transform: rotate(0deg); }
            30%      { transform: rotate(-14deg); }
            70%      { transform: rotate(8deg); }
        }
        @keyframes loa-blink {
            0%, 87%, 96%, 100% { opacity: 0; }
            91%, 93%           { opacity: 1; }
        }
        @media (prefers-reduced-motion: reduce) {
            .loa-figure, .loa-wing, .loa-lid { animation: none; }
        }
    </style>

    <ellipse cx="125" cy="200" rx="58" ry="5" fill="#2C2C2C" opacity="0.10"/>

    <g class="loa-figure">

        <g stroke="#B85B47" stroke-width="3.5" stroke-linecap="round" fill="none">
            <line x1="108" y1="165" x2="108" y2="192"/>
            <line x1="132" y1="165" x2="132" y2="192"/>
            <line x1="100" y1="192" x2="116" y2="192"/>
            <line x1="124" y1="192" x2="140" y2="192"/>
        </g>

        <ellipse cx="125" cy="125" rx="60" ry="48" fill="#C99240"/>
        <ellipse cx="130" cy="100" rx="48" ry="14" fill="#E8B96B" opacity="0.55"/>

        <g fill="#6E4317" opacity="0.55">
            <circle cx="140" cy="92"  r="3"/>
            <circle cx="158" cy="102" r="2.6"/>
            <circle cx="155" cy="135" r="2.6"/>
            <circle cx="143" cy="125" r="2.4"/>
            <circle cx="135" cy="108" r="2.2"/>
            <circle cx="148" cy="148" r="2.4"/>
            <circle cx="125" cy="100" r="2.2"/>
        </g>

        <ellipse cx="105" cy="142" rx="42" ry="26" fill="#FBF6E9"/>
        <path d="M 78 140 Q 105 138, 142 142"
              stroke="#E8B96B" stroke-width="0.8" fill="none" opacity="0.5"/>

        <!-- Raised wing, the wave -->
        <g class="loa-wing">
            <path d="M 130 110 Q 158 88, 192 64 Q 208 58, 213 70 Q 215 88, 196 105 Q 168 128, 138 130 Q 128 122, 130 110 Z"
                  fill="#A87727"/>
            <g stroke="#6E4317" stroke-width="1.4" fill="none" opacity="0.5" stroke-linecap="round">
                <path d="M 165 95 Q 180 85, 198 75"/>
                <path d="M 160 110 Q 178 100, 200 92"/>
                <path d="M 150 118 Q 168 112, 192 108"/>
            </g>
            <!-- Motion arcs near the wingtip -->
            <g stroke="#C99240" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6">
                <path d="M 218 60 Q 224 64, 222 72"/>
                <path d="M 226 50 Q 232 54, 230 62"/>
            </g>
        </g>

        <path d="M 180 130 L 198 120 L 200 138 Z" fill="#A87727"/>

        <circle cx="78" cy="83" r="32" fill="#C99240"/>
        <ellipse cx="78" cy="68" rx="22" ry="9" fill="#E8B96B" opacity="0.7"/>

        <path d="M 50 92 Q 48 110, 65 116 Q 82 116, 92 108 Q 88 96, 70 92 Z" fill="#FBF6E9"/>
        <path d="M 50 76 Q 78 70, 102 80 Q 94 90, 78 90 Q 56 90, 50 76 Z" fill="#2C2C2C"/>

        <circle cx="80" cy="82"   r="5.5" fill="#FBF6E9"/>
        <circle cx="80" cy="83"   r="4"   fill="#2C2C2C"/>
        <circle cx="82" cy="80.5" r="1.3" fill="#FBF6E9"/>
        <ellipse class="loa-lid" cx="80" cy="82" rx="6" ry="6" fill="#2C2C2C"/>

        <path d="M 50 90 L 30 92 L 50 98 Z" fill="#2C2C2C"/>

        <g stroke="#7F9670" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85">
            <path d="M 92  196 Q 90  188, 88  184"/>
            <path d="M 100 196 Q 102 188, 104 184"/>
        </g>
    </g>
</svg>
