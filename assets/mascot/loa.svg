<?xml version="1.0" encoding="UTF-8"?>
<!--
  Loa, the Vigdis brand mascot.

  A golden plover (Pluvialis apricaria), the bird whose return
  to Iceland traditionally announces the start of spring. Every
  Icelandic child grows up with the line "Loan er komin": the
  bird who quietly tells you a new rhythm is beginning.

  Visual notes:
    Side profile facing left, so she looks at the headline.
    Iceland's gold-fawn back with darker speckles, white belly,
    black bandit-mask eye-stripe, short pointed black beak,
    coral legs, a few moss-sage grass blades at her feet.
    Built from simple primitives so she scales cleanly from
    favicon (16px) to onboarding hero (480px).

  Voice and tone for copy:
    Calm. Shorter sentences than a parent would naturally use.
    The only exclamation she ever uses is "Hae!" or "Hi!".
    Kindly direct, never urgent.
    She never guilts. If you missed yesterday, she does not
    bring it up; she just shows you today.

  Animations:
    CSS animations live inside this file so it can be referenced
    via img src="loa.svg" and still breathe and blink on its own.
      .loa-figure: gentle 4.8s breathing rise and fall.
      .loa-lid:    occasional 5.6s blink.
    Both honour prefers-reduced-motion.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220" role="img" aria-labelledby="loa-title">
    <title id="loa-title">Loa, the Vigdis mascot, a friendly golden plover.</title>

    <style>
        .loa-figure {
            transform-origin: 120px 200px;
            animation: loa-breathe 4.8s ease-in-out infinite;
        }
        .loa-lid {
            opacity: 0;
            animation: loa-blink 5.6s ease-in-out infinite;
        }
        @keyframes loa-breathe {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-2.5px); }
        }
        @keyframes loa-blink {
            0%, 87%, 96%, 100% { opacity: 0; }
            91%, 93%           { opacity: 1; }
        }
        @media (prefers-reduced-motion: reduce) {
            .loa-figure, .loa-lid { animation: none; }
        }
    </style>

    <!-- Soft floor shadow. Sits outside the breathing group so
         it stays anchored while she rises. -->
    <ellipse cx="125" cy="200" rx="58" ry="5" fill="#2C2C2C" opacity="0.10"/>

    <g class="loa-figure">

        <!-- Legs (coral) and toes. -->
        <g stroke="#B85B47" stroke-width="3.5" stroke-linecap="round" fill="none">
            <line x1="108" y1="165" x2="108" y2="192"/>
            <line x1="132" y1="165" x2="132" y2="192"/>
            <line x1="100" y1="192" x2="116" y2="192"/>
            <line x1="124" y1="192" x2="140" y2="192"/>
        </g>

        <!-- Main body, warm gold ellipse. -->
        <ellipse cx="125" cy="125" rx="60" ry="48" fill="#C99240"/>

        <!-- Top of back highlight, lighter gold. -->
        <ellipse cx="130" cy="100" rx="48" ry="14" fill="#E8B96B" opacity="0.55"/>

        <!-- Speckled pattern on the back, the lóa's signature. -->
        <g fill="#6E4317" opacity="0.55">
            <circle cx="140" cy="92"  r="3"/>
            <circle cx="158" cy="102" r="2.6"/>
            <circle cx="170" cy="118" r="2.8"/>
            <circle cx="155" cy="135" r="2.6"/>
            <circle cx="143" cy="125" r="2.4"/>
            <circle cx="135" cy="108" r="2.2"/>
            <circle cx="148" cy="148" r="2.4"/>
            <circle cx="172" cy="138" r="2.2"/>
            <circle cx="125" cy="100" r="2.2"/>
        </g>

        <!-- White belly. -->
        <ellipse cx="105" cy="142" rx="42" ry="26" fill="#FBF6E9"/>
        <!-- Faint belly seam giving the white shape a centerline. -->
        <path d="M 78 140 Q 105 138, 142 142"
              stroke="#E8B96B" stroke-width="0.8" fill="none" opacity="0.5"/>

        <!-- Wing tucked along the rear flank. -->
        <ellipse cx="158" cy="132" rx="26" ry="34"
                 fill="#A87727" transform="rotate(8 158 132)"/>
        <g stroke="#6E4317" stroke-width="1.4" fill="none" opacity="0.5"
           stroke-linecap="round">
            <path d="M 155 112 Q 165 132, 162 154"/>
            <path d="M 167 116 Q 177 132, 172 150"/>
            <path d="M 147 116 Q 152 132, 148 152"/>
        </g>

        <!-- Small tail nub at rear. -->
        <path d="M 180 130 L 198 120 L 200 138 Z" fill="#A87727"/>

        <!-- Head. -->
        <circle cx="78" cy="83" r="32" fill="#C99240"/>
        <!-- Top of head light highlight. -->
        <ellipse cx="78" cy="68" rx="22" ry="9" fill="#E8B96B" opacity="0.7"/>

        <!-- White throat and face patch (sits under the mask). -->
        <path d="M 50 92 Q 48 110, 65 116 Q 82 116, 92 108 Q 88 96, 70 92 Z"
              fill="#FBF6E9"/>

        <!-- Black eye-mask, the lóa's defining feature. -->
        <path d="M 50 76 Q 78 70, 102 80 Q 94 90, 78 90 Q 56 90, 50 76 Z"
              fill="#2C2C2C"/>

        <!-- Eye: white sclera, dark pupil, tiny catchlight. -->
        <circle cx="80"   cy="82"   r="5.5" fill="#FBF6E9"/>
        <circle cx="80"   cy="83"   r="4"   fill="#2C2C2C"/>
        <circle cx="82"   cy="80.5" r="1.3" fill="#FBF6E9"/>

        <!-- Eyelid drops over the eye briefly to blink. Sized
             slightly larger than the sclera so the closure
             reads cleanly. -->
        <ellipse class="loa-lid" cx="80" cy="82" rx="6" ry="6" fill="#2C2C2C"/>

        <!-- Beak: short, pointed, black. -->
        <path d="M 50 90 L 30 92 L 50 98 Z" fill="#2C2C2C"/>

        <!-- A few blades of grass at her feet, moss-sage green,
             so she looks perched rather than floating. -->
        <g stroke="#7F9670" stroke-width="2" stroke-linecap="round"
           fill="none" opacity="0.85">
            <path d="M 92  196 Q 90  188, 88  184"/>
            <path d="M 100 196 Q 102 188, 104 184"/>
            <path d="M 148 196 Q 152 190, 156 186"/>
        </g>
    </g>
</svg>
