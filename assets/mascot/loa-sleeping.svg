<?xml version="1.0" encoding="UTF-8"?>
<!--
  Loa, sleeping pose. Head tucked low into her body, eyes closed,
  two small italic z's drifting upward. Lives in the footer as a
  quiet "see you tomorrow" beat at the bottom of the page.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220" role="img" aria-labelledby="loa-sleep-title">
    <title id="loa-sleep-title">Loa asleep, head tucked.</title>

    <style>
        .loa-figure { transform-origin: 120px 200px; animation: loa-snore 6s ease-in-out infinite; }
        .loa-z      { animation: loa-z-rise 4.6s ease-in-out infinite; }
        .loa-z-2    { animation-delay: 1.6s; }
        @keyframes loa-snore {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-1.5px); }
        }
        @keyframes loa-z-rise {
            0%   { opacity: 0; transform: translateY(8px); }
            25%  { opacity: 1; }
            85%  { opacity: 0.8; transform: translateY(-12px); }
            100% { opacity: 0; transform: translateY(-18px); }
        }
        @media (prefers-reduced-motion: reduce) {
            .loa-figure, .loa-z { animation: none; }
        }
    </style>

    <ellipse cx="125" cy="200" rx="58" ry="5" fill="#2C2C2C" opacity="0.10"/>

    <g font-family="Georgia, 'Times New Roman', serif" font-size="20" font-style="italic" font-weight="600" fill="#A87727" opacity="0.75">
        <text class="loa-z"           x="112" y="48">z</text>
        <text class="loa-z loa-z-2"   x="130" y="32" font-size="14">z</text>
    </g>

    <g class="loa-figure">

        <!-- Tucked legs, closer together -->
        <g stroke="#B85B47" stroke-width="3.5" stroke-linecap="round" fill="none">
            <line x1="116" y1="172" x2="116" y2="192"/>
            <line x1="134" y1="172" x2="134" y2="192"/>
            <line x1="108" y1="192" x2="124" y2="192"/>
            <line x1="126" y1="192" x2="142" y2="192"/>
        </g>

        <!-- Body sits a touch lower and wider, sleeping posture -->
        <ellipse cx="125" cy="132" rx="62" ry="50" fill="#C99240"/>
        <ellipse cx="130" cy="106" rx="48" ry="14" fill="#E8B96B" opacity="0.55"/>

        <g fill="#6E4317" opacity="0.55">
            <circle cx="140" cy="100" r="3"/>
            <circle cx="158" cy="110" r="2.6"/>
            <circle cx="170" cy="126" r="2.8"/>
            <circle cx="155" cy="142" r="2.6"/>
            <circle cx="143" cy="132" r="2.4"/>
            <circle cx="135" cy="116" r="2.2"/>
            <circle cx="148" cy="158" r="2.4"/>
            <circle cx="172" cy="148" r="2.2"/>
            <circle cx="125" cy="108" r="2.2"/>
        </g>

        <ellipse cx="105" cy="150" rx="42" ry="26" fill="#FBF6E9"/>
        <path d="M 78 148 Q 105 146, 142 150" stroke="#E8B96B" stroke-width="0.8" fill="none" opacity="0.5"/>

        <!-- Wing wrapped around body like a blanket -->
        <ellipse cx="155" cy="138" rx="32" ry="34" fill="#A87727" transform="rotate(8 155 138)"/>
        <g stroke="#6E4317" stroke-width="1.4" fill="none" opacity="0.5" stroke-linecap="round">
            <path d="M 152 118 Q 162 138, 159 158"/>
            <path d="M 164 122 Q 174 138, 169 156"/>
            <path d="M 144 122 Q 149 138, 145 158"/>
        </g>

        <path d="M 180 138 L 198 128 L 200 146 Z" fill="#A87727"/>

        <!-- Head tucked low -->
        <circle cx="78" cy="106" r="32" fill="#C99240"/>
        <ellipse cx="78" cy="91" rx="22" ry="9" fill="#E8B96B" opacity="0.7"/>

        <path d="M 50 116 Q 48 134, 65 140 Q 82 140, 92 132 Q 88 120, 70 116 Z" fill="#FBF6E9"/>
        <path d="M 50 100 Q 78 94, 102 104 Q 94 114, 78 114 Q 56 114, 50 100 Z" fill="#2C2C2C"/>

        <!-- Closed eye: a small soft curve drawn in cream -->
        <path d="M 73 106 Q 80 110, 87 106" stroke="#FBF6E9" stroke-width="2.5" stroke-linecap="round" fill="none"/>

        <!-- Beak slightly tucked -->
        <path d="M 50 114 L 32 116 L 50 120 Z" fill="#2C2C2C"/>

        <g stroke="#7F9670" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85">
            <path d="M 96  196 Q 94  188, 92  184"/>
            <path d="M 104 196 Q 106 188, 108 184"/>
            <path d="M 150 196 Q 154 190, 158 186"/>
        </g>
    </g>
</svg>
